    function renderReports(){
      const t=totals(reportFilter.month), expenses=categorySum('expense'), incomes=categorySum('income'), accountsObj=Object.fromEntries(data.accounts.filter(a=>!a.archived).map(a=>[a.name,Number(a.currentBalance||0)]));
      const biggest=periodTransactions(reportFilter.month).filter(t=>t.type==='expense').sort((a,b)=>b.amount-a.amount).slice(0,5);
      byId('screen-reports').innerHTML=`<div class="section-head"><div><h1>Relatórios</h1><p>Gráficos em Canvas/JS puro, sem biblioteca externa.</p></div><button class="btn small" onclick="printReport()">PDF</button></div><div class="card"><div class="field-row"><div><label>Mês</label><input type="month" value="${reportFilter.month}" onchange="reportFilter.month=this.value;render()"></div><div><label>Relatório</label><button class="btn full" onclick="printReport()">Imprimir/salvar PDF</button></div></div></div><div class="grid three" style="margin-top:12px">${stat('⬆️','Total recebido',money(t.income),'positive')}${stat('⬇️','Total gasto',money(t.expense),'negative')}${stat('⚖️','Saldo',money(t.balance),t.balance>=0?'positive':'negative')}</div><div class="grid two" style="margin-top:12px"><div class="card"><h2>Gastos por categoria</h2><div class="chart-wrap"><canvas id="pieExpense" width="330" height="260"></canvas></div><div id="legExpense" class="legend"></div></div><div class="card"><h2>Receitas por categoria</h2><div class="chart-wrap"><canvas id="pieIncome" width="330" height="260"></canvas></div><div id="legIncome" class="legend"></div></div><div class="card"><h2>Dinheiro por conta</h2><div class="chart-wrap"><canvas id="pieAccounts" width="330" height="260"></canvas></div><div id="legAccounts" class="legend"></div></div><div class="card"><h2>Receitas x despesas por mês</h2><canvas id="barMonth" width="420" height="260"></canvas></div><div class="card"><h2>Evolução do saldo/patrimônio</h2><canvas id="lineBalance" width="420" height="260"></canvas></div><div class="card"><h2>Maiores despesas</h2><div class="list">${biggest.length?biggest.map(tx=>txItem(tx,true)).join(''):'<div class="empty">Sem despesas no período.</div>'}</div></div></div>`;
      setTimeout(()=>{drawPie('pieExpense','legExpense',expenses);drawPie('pieIncome','legIncome',incomes);drawPie('pieAccounts','legAccounts',accountsObj);drawBars();drawLine();},20);
    }
    function drawPie(canvasId, legId, obj){const canvas=byId(canvasId); if(!canvas) return; const ctx=canvas.getContext('2d'); ctx.clearRect(0,0,canvas.width,canvas.height); const entries=Object.entries(obj).filter(e=>e[1]>0); const total=entries.reduce((s,e)=>s+e[1],0); const leg=byId(legId); if(!total){ctx.fillStyle=getComputedStyle(document.body).getPropertyValue('--muted'); ctx.font='15px system-ui'; ctx.textAlign='center'; ctx.fillText('Sem dados para o período',canvas.width/2,canvas.height/2); leg.innerHTML=''; return;} let start=-Math.PI/2; entries.forEach(([name,val],i)=>{const ang=(val/total)*Math.PI*2; ctx.beginPath(); ctx.moveTo(130,130); ctx.arc(130,130,92,start,start+ang); ctx.closePath(); ctx.fillStyle=colors[i%colors.length]; ctx.fill(); start+=ang;}); ctx.beginPath(); ctx.fillStyle=getComputedStyle(document.body).getPropertyValue('--card'); ctx.arc(130,130,48,0,Math.PI*2); ctx.fill(); ctx.fillStyle=getComputedStyle(document.body).getPropertyValue('--text'); ctx.font='bold 15px system-ui'; ctx.textAlign='center'; ctx.fillText(money(total),130,132); leg.innerHTML=entries.map(([name,val],i)=>`<div class="legend-row"><span><i class="dot" style="background:${colors[i%colors.length]}"></i>${esc(name)}</span><b>${money(val)} — ${((val/total)*100).toFixed(1).replace('.',',')}%</b></div>`).join('');}
    function drawBars(){const c=byId('barMonth'); if(!c) return; const ctx=c.getContext('2d'); ctx.clearRect(0,0,c.width,c.height); const months=[]; for(let i=5;i>=0;i--) months.push(nowMonthOffset(-i)); const vals=months.map(m=>totals(m)); const max=Math.max(1,...vals.flatMap(v=>[v.income,v.expense])); ctx.font='12px system-ui'; vals.forEach((v,i)=>{const x=40+i*62; const hi=v.income/max*150, he=v.expense/max*150; ctx.fillStyle='#22c55e'; ctx.fillRect(x,205-hi,22,hi); ctx.fillStyle='#ef4444'; ctx.fillRect(x+25,205-he,22,he); ctx.fillStyle=getComputedStyle(document.body).getPropertyValue('--muted'); ctx.fillText(months[i].slice(5),x+8,230);}); ctx.fillStyle=getComputedStyle(document.body).getPropertyValue('--text'); ctx.fillText('Verde: receitas • Vermelho: despesas',20,20);}
    function nowMonthOffset(n){const d=new Date(nowMonth()+'-15T12:00:00'); d.setMonth(d.getMonth()+n); return d.toISOString().slice(0,7);}
    function drawLine(){const c=byId('lineBalance'); if(!c) return; const ctx=c.getContext('2d'); ctx.clearRect(0,0,c.width,c.height); const months=[]; for(let i=5;i>=0;i--) months.push(nowMonthOffset(-i)); let running=data.accounts.reduce((s,a)=>s+Number(a.initialBalance||0),0); const vals=months.map(m=>{const ts=periodTransactions(m); running+=ts.filter(t=>t.type==='income').reduce((s,t)=>s+t.amount,0)-ts.filter(t=>t.type==='expense'&&t.status==='paid').reduce((s,t)=>s+t.amount,0); return running;}); const min=Math.min(...vals,0), max=Math.max(...vals,1); ctx.strokeStyle=getComputedStyle(document.documentElement).getPropertyValue('--primary'); ctx.lineWidth=4; ctx.beginPath(); vals.forEach((v,i)=>{const x=35+i*70; const y=210-((v-min)/(max-min||1))*160; if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y); ctx.fillStyle=getComputedStyle(document.body).getPropertyValue('--text'); ctx.fillText(months[i].slice(5),x-5,232);}); ctx.stroke(); ctx.fillStyle=getComputedStyle(document.body).getPropertyValue('--text'); ctx.fillText('Evolução aproximada do patrimônio',20,20);}
    function renderCalendar(){const d=new Date(reportFilter.month+'-01T12:00:00'); const y=d.getFullYear(), m=d.getMonth(); const first=new Date(y,m,1).getDay(); const days=new Date(y,m+1,0).getDate(); const events=data.transactions.filter(t=>monthOf(t.dueDate||t.date)===reportFilter.month); let html='<div class="calendar">'+['D','S','T','Q','Q','S','S'].map(x=>`<div class="cal-head">${x}</div>`).join(''); for(let i=0;i<first;i++) html+='<div></div>'; for(let day=1;day<=days;day++){const iso=`${reportFilter.month}-${String(day).padStart(2,'0')}`; const ev=events.filter(e=>(e.dueDate||e.date)===iso); html+=`<div class="cal-day ${iso===todayISO()?'today':''}" onclick="showDayEvents('${iso}')">${day}<div class="markers">${ev.slice(0,4).map(e=>`<i class="marker" style="background:${e.type==='income'?'#22c55e':e.status==='paid'?'#0ea5e9':'#ef4444'}"></i>`).join('')}</div></div>`} html+='</div>'; byId('screen-calendar').innerHTML=`<div class="section-head"><div><h1>Calendário financeiro</h1><p>Contas, receitas, parcelas e vencimentos.</p></div></div><div class="card"><label>Mês</label><input type="month" value="${reportFilter.month}" onchange="reportFilter.month=this.value;render()"></div><div class="card" style="margin-top:12px">${html}</div>`}
    function showDayEvents(iso){const ev=data.transactions.filter(e=>(e.dueDate||e.date)===iso); openModal('Eventos do dia',brDate(iso),`<div class="list">${ev.length?ev.map(e=>txItem(e,true)).join(''):'<div class="empty">Nenhum evento financeiro neste dia.</div>'}</div>`,`<button class="btn ghost full" onclick="closeModal()">Fechar</button>`)}

    /* =========================================================
       13. CONFIGURAÇÕES, BACKUP, PIN, BOAS-VINDAS
       ========================================================= */
    function renderConfig(){
      byId('screen-config').innerHTML=`<div class="section-head"><div><h1>Configurações</h1><p>Perfil, tema, PIN, categorias, backup e privacidade.</p></div></div>
      <div class="card"><form id="settingsForm" class="form-grid"><div><label>Nome do usuário</label><input name="userName" value="${esc(data.settings.userName||'')}"></div><div class="field-row"><div><label>Tema</label><select name="theme"><option value="light" ${data.settings.theme==='light'?'selected':''}>Claro</option><option value="dark" ${data.settings.theme==='dark'?'selected':''}>Escuro</option></select></div><div><label>Cor principal</label><input name="primary" type="color" value="${esc(data.settings.primary||'#2563eb')}"></div></div><button type="button" class="btn" onclick="saveSettings()">Salvar configurações</button></form></div>
      <div class="card" style="margin-top:12px"><h2>PIN de acesso</h2><p>O bloqueio por PIN protege apenas o acesso local ao aplicativo neste dispositivo.</p><div class="row wrap" style="margin-top:12px"><button class="btn" onclick="openPinSetup()">${data.settings.pinEnabled?'Alterar PIN':'Ativar PIN'}</button>${data.settings.pinEnabled?'<button class="btn danger" onclick="disablePin()">Desativar PIN</button>':''}</div></div>
      <div class="card" style="margin-top:12px"><h2>Categorias personalizadas</h2><div class="field-row"><div><label>Receitas</label><textarea id="incomeCats">${esc(data.categories.income.join('\n'))}</textarea></div><div><label>Despesas</label><textarea id="expenseCats">${esc(data.categories.expense.join('\n'))}</textarea></div></div><button class="btn" style="margin-top:10px" onclick="saveCategories()">Salvar categorias</button></div>
      <div class="card" style="margin-top:12px"><h2>Backup e dados</h2><div class="row wrap"><button class="btn ghost" onclick="openBackupModal()">Backup/restauração</button><button class="btn ghost" onclick="exportCSV()">CSV lançamentos</button><button class="btn ghost" onclick="printReport()">Relatório PDF</button><button class="btn danger" onclick="wipeData()">Apagar tudo</button></div><p class="small" style="margin-top:10px">Último backup: ${data.settings.lastBackup?brDate(data.settings.lastBackup):'Nunca'}</p></div>
      <div class="card" style="margin-top:12px"><h2>Aviso de privacidade</h2><p>Seus dados ficam salvos apenas neste dispositivo, por meio do armazenamento local do navegador. O aplicativo não acessa bancos, não transmite informações e não possui conexão com instituições financeiras. O usuário é responsável pelo backup dos dados.</p></div>`;
    }
    function saveSettings(){const f=new FormData(byId('settingsForm')); data.settings.userName=f.get('userName'); data.settings.theme=f.get('theme'); data.settings.primary=f.get('primary'); save(); render(); toast('Configurações salvas.');}
    function saveCategories(){data.categories.income=byId('incomeCats').value.split('\n').map(x=>x.trim()).filter(Boolean); data.categories.expense=byId('expenseCats').value.split('\n').map(x=>x.trim()).filter(Boolean); save(); render(); toast('Categorias salvas.');}
    function openBackupModal(){openModal('Backup e restauração','Exporte JSON, importe backup ou gere relatório.',`<div class="grid"><button class="btn" onclick="exportBackup()">Exportar backup JSON</button><label class="btn ghost" style="cursor:pointer">Importar backup JSON<input type="file" accept="application/json" class="hidden" onchange="importBackup(this.files[0])"></label><button class="btn ghost" onclick="exportCSV()">Exportar lançamentos CSV</button><button class="btn ghost" onclick="printReport()">Relatório HTML/PDF</button><button class="btn danger" onclick="wipeData()">Apagar todos os dados</button></div>`,`<button class="btn ghost full" onclick="closeModal()">Fechar</button>`)}
    function download(name, content, type='application/json'){const blob=new Blob([content],{type}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=name; a.click(); URL.revokeObjectURL(a.href);}
    function exportBackup(){data.settings.lastBackup=todayISO(); save(); download('backup-bolso-certo-'+todayISO()+'.json', JSON.stringify(data,null,2)); toast('Backup exportado.');}
    function importBackup(file){if(!file) return; const r=new FileReader(); r.onload=()=>{try{const obj=JSON.parse(r.result); if(!obj.accounts||!obj.transactions) throw new Error('inválido'); data=obj; save(); closeModal(); render(); toast('Backup importado.');}catch(e){toast('Arquivo de backup inválido.')}}; r.readAsText(file);}
    function exportCSV(){const rows=[['tipo','descricao','valor','data','vencimento','categoria','status']].concat(data.transactions.map(t=>[t.type,t.description,t.amount,t.date,t.dueDate,t.category,t.status])); download('lancamentos-bolso-certo.csv', rows.map(r=>r.map(x=>`"${String(x??'').replace(/"/g,'""')}"`).join(';')).join('\n'), 'text/csv;charset=utf-8'); toast('CSV exportado.');}
    function printReport(){const t=totals(reportFilter.month); const rows=periodTransactions(reportFilter.month).map(tx=>`<tr><td>${tx.type}</td><td>${esc(tx.description)}</td><td>${money(tx.amount)}</td><td>${brDate(tx.date)}</td><td>${esc(tx.category||'')}</td><td>${esc(tx.status||'')}</td></tr>`).join(''); byId('printArea').innerHTML=`<div class="print-title">Bolso Certo — Relatório financeiro</div><p>Usuário: ${esc(data.settings.userName||'Não informado')}</p><p>Período: ${reportFilter.month} • Gerado em ${brDate(todayISO())}</p><div class="print-grid"><div class="print-card"><b>Receitas</b><br>${money(t.income)}</div><div class="print-card"><b>Despesas</b><br>${money(t.expense)}</div><div class="print-card"><b>Saldo</b><br>${money(t.balance)}</div></div><div class="print-card"><h3>Contas cadastradas</h3>${data.accounts.map(a=>`<p>${esc(a.name)} — ${money(a.currentBalance)}</p>`).join('')}</div><div class="print-card"><h3>Lançamentos</h3><table class="print-table"><thead><tr><th>Tipo</th><th>Descrição</th><th>Valor</th><th>Data</th><th>Categoria</th><th>Status</th></tr></thead><tbody>${rows}</tbody></table></div><p><b>Desenvolvido por Tiago da Silva</b> — Instagram @tiagohardlife</p><p><b>Hardlife Tec</b> — Instagram @hardlifetec</p>`; window.print();}
    function wipeData(){confirmBox('Deseja realmente apagar todos os dados? Esta ação não pode ser desfeita.',()=>{localStorage.removeItem(STORAGE_KEY); data=defaultData(); closeModal(); render(); showWelcome(); toast('Todos os dados foram apagados.');})}
    function openPinSetup(){openModal('Configurar PIN','Crie um PIN de 4 ou 6 dígitos.',`<form id="pinForm" class="form-grid"><div><label>Novo PIN</label><input name="pin" type="password" inputmode="numeric" maxlength="6"></div><div><label>Confirmar PIN</label><input name="pin2" type="password" inputmode="numeric" maxlength="6"></div></form>`,`<button class="btn ghost" onclick="closeModal()">Cancelar</button><button class="btn" onclick="savePin()">Salvar PIN</button>`)}
    function savePin(){const f=new FormData(byId('pinForm')), p=f.get('pin'), p2=f.get('pin2'); if(!/^\d{4,6}$/.test(p)) return toast('O PIN deve ter 4 ou 6 números.'); if(p!==p2) return toast('A confirmação não confere.'); data.settings.pinEnabled=true; data.settings.pin=p; save(); closeModal(); render(); toast('PIN ativado.');}
    function disablePin(){data.settings.pinEnabled=false; data.settings.pin=''; save(); render(); toast('PIN desativado.');}
    function showWelcome(){if(data.settings.privacyAccepted) return; const el=byId('welcomeScreen'); el.innerHTML=`<div class="welcome-card"><div class="logo" style="width:64px;height:64px;font-size:32px;margin-bottom:14px">💰</div><h1>Bem-vindo ao Bolso Certo</h1><p>Este aplicativo não acessa sua conta bancária. Todos os dados são cadastrados manualmente e ficam salvos apenas no seu dispositivo.</p><div class="grid" style="margin-top:18px"><button class="btn success" onclick="startClean()">Começar do zero</button><button class="btn ghost" onclick="loadExamples()">Carregar dados de exemplo</button></div><p class="tiny" style="margin-top:14px">Offline • Sem servidor • Sem bibliotecas externas • Desenvolvido por Tiago da Silva • @tiagohardlife • Hardlife Tec • @hardlifetec</p></div>`; el.classList.add('show');}
    function startClean(){data.settings.privacyAccepted=true; save(); byId('welcomeScreen').classList.remove('show'); render();}
    function loadExamples(){data=defaultData(); data.settings.privacyAccepted=true; data.settings.userName='Tiago'; data.accounts=[{id:'acc_mp',name:'Mercado Pago',type:'Carteira digital',initialBalance:1200,currentBalance:1200,color:'#22c55e',icon:'💳',note:'Conta usada para gastos diários.',main:true,archived:false,createdAt:todayISO()},{id:'acc_san',name:'Santander',type:'Banco',initialBalance:800,currentBalance:800,color:'#ef4444',icon:'🏦',note:'Conta principal.',main:false,archived:false,createdAt:todayISO()},{id:'acc_cash',name:'Dinheiro em espécie',type:'Dinheiro em espécie',initialBalance:150,currentBalance:150,color:'#f59e0b',icon:'💵',note:'Carteira física.',main:false,archived:false,createdAt:todayISO()}]; data.transactions=[{id:uid('tx'),type:'income',description:'Salário',amount:5000,date:nowMonth()+'-05',dueDate:nowMonth()+'-05',category:'Salário',accountId:'acc_san',paymentMethod:'Pix',status:'paid',createdAt:todayISO()},{id:uid('tx'),type:'expense',description:'Mercado',amount:450,date:nowMonth()+'-10',dueDate:nowMonth()+'-10',category:'Mercado',accountId:'acc_mp',paymentMethod:'Débito',status:'paid',createdAt:todayISO()},{id:uid('tx'),type:'expense',description:'Internet',amount:119.9,date:nowMonth()+'-15',dueDate:nowMonth()+'-15',category:'Internet',accountId:'acc_san',paymentMethod:'Boleto',status:'pending',createdAt:todayISO()}]; data.goals=[{id:uid('goal'),name:'Viagem para Gramado',total:3500,saved:1000,targetDate:addMonths(todayISO(),5),category:'Viagem',priority:'Alta',accountId:'acc_mp',note:'',done:false}]; data.creditCards=[{id:'card_nu',name:'Nubank',institution:'Nubank',limitTotal:3000,limitUsed:650,closeDay:20,dueDay:10,color:'#8b5cf6'}]; recalculateBalances(); save(); byId('welcomeScreen').classList.remove('show'); render(); toast('Dados de exemplo carregados.');}
    function showLock(){if(!data.settings.pinEnabled) return; const el=byId('lockScreen'); let pin=''; function draw(){el.innerHTML=`<div class="welcome-card"><h1>Bolso Certo bloqueado 🔒</h1><p>Digite seu PIN para acessar.</p><div class="pin-dots">${[0,1,2,3,4,5].slice(0,data.settings.pin.length||4).map((_,i)=>`<i class="pin-dot ${i<pin.length?'on':''}"></i>`).join('')}</div><div class="pin-pad">${[1,2,3,4,5,6,7,8,9,'⌫',0,'OK'].map(k=>`<button class="pin-key" onclick="pinPress('${k}')">${k}</button>`).join('')}</div></div>`} window.pinPress=function(k){if(k==='⌫') pin=pin.slice(0,-1); else if(k==='OK'){ if(pin===data.settings.pin){el.classList.remove('show'); toast('Acesso liberado.')} else {pin=''; toast('PIN incorreto.')} } else if(pin.length<6) pin+=k; draw();}; draw(); el.classList.add('show');}

    /* =========================================================
       14. INICIALIZAÇÃO
       ========================================================= */
    function init(){ load(); applyTheme(); generateRecurringForMonth(nowMonth()); render(); showWelcome(); showLock(); }
    window.addEventListener('load', init);
  </script>
</body>
</html>
